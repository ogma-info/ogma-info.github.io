---
layout: default
---

<section class="tuto-page">
    <div class="container">
        <div class="tuto-layout">
            <!-- Sidebar with Table of Contents -->
            <aside class="tuto-sidebar">
                <div class="toc-panel">
                    <h3>Sommaire</h3>
                    <ul class="toc-list" id="toc-list">
                        <!-- Auto-generated by main.js -->
                    </ul>
                    <a href="{{ '/' | relative_url }}" class="back-link">
                        <span>← Retour à l'accueil</span>
                    </a>
                </div>
            </aside>

            <!-- Main Content Area -->
            <article class="tuto-content">
                <header class="tuto-header">
                    <span class="tuto-header-icon">{{ page.icon | default: '📄' }}</span>
                    <h1>{{ page.title }}</h1>
                </header>

                <div class="markdown-body">
                    {{ content }}
                </div>

                <div class="tuto-footer" style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                    <p style="color: var(--text-muted); font-style: italic;">
                        Une idée d'amélioration pour ce tutoriel ? 
                        <a href="https://github.com/6co-cp/ogma.github.io/issues" target="_blank" rel="noopener">Ouvre une issue sur GitHub</a>.
                    </p>
                </div>
            </article>
        </div>
    </div>
</section>
